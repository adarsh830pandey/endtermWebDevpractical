<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel/Consonent checker</title>
    <style>
        body{
            font-family:Arial,Helvetica,sans-serif;
            background-color:white;
            padding:2rem;
         }
        input[type="text"]{padding:0.5rem;width:4rem;text-align:center}
        button{padding:0.5rem 1rem;margin-left:0.5rem}
        #result{margin-top:1rem;font-weight:bold}
</style>
</head>
<body>
    <h1>Vowel or Consonant checker</h1>
    <label for="charInput">Enter a letter:</label>
   <input id="charInput" type="text" maxlength="1" />
   <button id="checkBtn">Check</button>
   <div id="result" aria-live="polite"></div>
   <script src="script.js"></script>

    
</body>
</html>
